<svg data-logo="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 41" fill="none">
  <g id="logogram">
    <!-- Background circle -->
    <circle cx="21" cy="20.5" r="19.5" fill="url(#gradient)" />
    <!-- Envelope body -->
    <rect x="9.5" y="13" width="23" height="16" rx="2" fill="white" />
    <!-- Envelope flap -->
    <path d="M9.5 13L21 23.5L32.5 13" stroke="url(#gradient)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Paper lines detail -->
    <line x1="13" y1="29" x2="29" y2="29" stroke="url(#gradient)" stroke-width="1.2" stroke-linecap="round" />
    <line x1="13" y1="26.5" x2="26" y2="26.5" stroke="url(#gradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.5" />
    <!-- Swoosh accent (Omni / infinite reach) -->
    <path d="M12 10.5L19 6.5L26 10.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8" />
  </g>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="42" y2="41" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1" />
      <stop offset="1" stop-color="#A855F7" />
    </linearGradient>
  </defs>
</svg>